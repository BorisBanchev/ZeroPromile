name: Production — Build, Test, Migrate, Deploy
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  NODE_ENV: production
  APP_ENV: production
  IMAGE_NAME: ghcr.io/borisbanchev/zeropromile-api

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install
        run: cd backend && npm ci

      - name: Generate Prisma
        run: cd backend && npx prisma generate

      - name: Build
        run: cd backend && npm run build

      - name: Lint
        run: cd backend && npm run lint

      - name: Wait for Postgres
        run: |
          until pg_isready -h localhost -p 5432; do sleep 2; done

      - name: Run migrations (test DB)
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb
        run: cd backend && npx prisma migrate deploy

      - name: Run tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb
          NODE_ENV: test
        run: cd backend && npm run test

  build-image:
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-image
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v5

      - name: Run Prisma migrations (prod DB)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: cd backend && npx prisma migrate deploy

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Verify Fly auth
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl auth whoami
          flyctl status --app zeropromile-api || true

      - name: Deploy to Fly
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl deploy \
            --image ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --app zeropromile-api \
            --config backend/fly.production.toml
