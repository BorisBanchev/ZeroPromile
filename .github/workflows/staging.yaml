name: Staging — Build, Test, Migrate, Deploy
on:
  push:
    branches:
      - staging

permissions:
  contents: read
  packages: write

env:
  APP_ENV: staging
  IMAGE_NAME: ghcr.io/borisbanchev/zeropromile-api-staging

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install
        env:
          NODE_ENV: development
        run: cd backend && npm ci --include=dev

      - name: Generate Prisma
        run: cd backend && npx prisma generate

      - name: Build
        run: cd backend && npm run build

      - name: Lint
        run: cd backend && npm run lint

      - name: Wait for Postgres
        run: |
          until pg_isready -h localhost -p 5432; do sleep 2; done

      - name: Run migrations (test DB)
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb
        run: cd backend && npx prisma migrate deploy

      - name: Run tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb
          NODE_ENV: test
          JWT_TOKEN_SECRET_STAGING: test_secret
          JWT_REFRESH_TOKEN_SECRET_STAGING: test_refresh_secret
          JWT_EXPIRES_IN: 15m
          REFRESH_TOKEN_EXPIRES_IN: 7d
        run: cd backend && npm run test

  build-image:
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile.staging
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-image

    steps:
      - uses: actions/checkout@v5

      - name: Run Prisma migrations (staging DB)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_STAGING }}
        run: cd backend && npx prisma migrate deploy

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_STAGING }}
        run: |
          flyctl deploy \
            --image ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --app zeropromile-api-staging \
            --config backend/fly.toml
